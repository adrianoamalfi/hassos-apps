---
name: Release

on:
  push:
    branches: [main]

jobs:
  detect-version-bump:
    runs-on: ubuntu-latest
    outputs:
      releases: ${{ steps.check.outputs.releases }}
      any_release: ${{ steps.check.outputs.any_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for version bumps
        id: check
        run: |
          BASE=${{ github.event.before }}
          RELEASES="[]"

          for config in */config.yaml; do
            ADDON_DIR=$(dirname "${config}")

            # Skip if this addon wasn't changed
            if ! git diff --name-only "${BASE}" HEAD \
                | grep -q "^${ADDON_DIR}/"; then
              continue
            fi

            # Get current version
            CURRENT=$(grep '^version:' "${config}" \
              | sed 's/version: *"\?\([^"]*\)"\?/\1/')

            # Get previous version (if file existed)
            PREVIOUS=$(git show "${BASE}:${config}" 2>/dev/null \
              | grep '^version:' \
              | sed 's/version: *"\?\([^"]*\)"\?/\1/' || echo "")

            if [ -n "${CURRENT}" ] && [ "${CURRENT}" != "${PREVIOUS}" ]; then
              # Verify tag doesn't already exist
              TAG="${ADDON_DIR}-v${CURRENT}"
              if git tag -l "${TAG}" | grep -q .; then
                echo "::warning::Tag ${TAG} already exists, skipping"
                continue
              fi

              echo "Version bump detected: ${ADDON_DIR} ${PREVIOUS} -> ${CURRENT}"
              RELEASES=$(echo "${RELEASES}" | \
                jq -c --arg addon "${ADDON_DIR}" \
                --arg version "${CURRENT}" \
                '. + [{"addon": $addon, "version": $version}]')
            fi
          done

          if [ "${RELEASES}" = "[]" ]; then
            echo "any_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "any_release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "releases=${RELEASES}" >> "$GITHUB_OUTPUT"

  create-release:
    needs: detect-version-bump
    if: needs.detect-version-bump.outputs.any_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        release: ${{ fromJson(needs.detect-version-bump.outputs.releases) }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog
        id: changelog
        run: |
          ADDON="${{ matrix.release.addon }}"
          VERSION="${{ matrix.release.version }}"
          CHANGELOG="${ADDON}/CHANGELOG.md"

          if [ -f "${CHANGELOG}" ]; then
            # Extract the section for this version (between ## [version] headers)
            NOTES=$(awk \
              "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found" \
              "${CHANGELOG}")
            if [ -z "${NOTES}" ]; then
              NOTES="Release ${VERSION} of ${ADDON}"
            fi
          else
            NOTES="Release ${VERSION} of ${ADDON}"
          fi

          # Write to file for multiline support
          echo "${NOTES}" > /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ matrix.release.addon }}-v${{ matrix.release.version }}"
          name: "${{ matrix.release.addon }} v${{ matrix.release.version }}"
          body_path: /tmp/release_notes.md
          generate_release_notes: false
