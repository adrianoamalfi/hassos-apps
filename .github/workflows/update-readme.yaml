---
name: Update README

on:
  push:
    branches: [main]
    paths:
      - "*/config.yaml"
      - "*/upstream.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate add-on table
        id: table
        run: |
          TABLE="| Add-on | Version | Description | Upstream |\n"
          TABLE+="|--------|---------|-------------|----------|\n"

          for config in */config.yaml; do
            DIR=$(dirname "${config}")

            NAME=$(python3 -c "
          import yaml
          with open('${config}') as f:
              c = yaml.safe_load(f)
          print(c.get('name', '${DIR}'))
          ")
            VERSION=$(python3 -c "
          import yaml
          with open('${config}') as f:
              c = yaml.safe_load(f)
          print(c.get('version', ''))
          ")
            DESC=$(python3 -c "
          import yaml
          with open('${config}') as f:
              c = yaml.safe_load(f)
          print(c.get('description', ''))
          ")

            UPSTREAM=""
            if [ -f "${DIR}/upstream.yaml" ]; then
              UPSTREAM=$(python3 -c "
          import yaml
          with open('${DIR}/upstream.yaml') as f:
              u = yaml.safe_load(f)
          repo = u.get('repo', '')
          if repo:
              print(f'[{repo}](https://github.com/{repo})')
          else:
              print('-')
          ")
            else
              UPSTREAM="-"
            fi

            TABLE+="| [${NAME}](./${DIR}) | ${VERSION} | ${DESC} | ${UPSTREAM} |\n"
          done

          # Write table to temp file
          printf '%b' "${TABLE}" > /tmp/addon_table.md

      - name: Update README.md
        run: |
          if ! grep -q "ADDON-TABLE-START" README.md; then
            echo "::warning::README.md missing ADDON-TABLE markers, skipping"
            exit 0
          fi

          # Replace content between markers
          python3 -c "
          import re

          with open('README.md') as f:
              readme = f.read()

          with open('/tmp/addon_table.md') as f:
              table = f.read()

          pattern = r'(<!-- ADDON-TABLE-START -->).*?(<!-- ADDON-TABLE-END -->)'
          replacement = f'\\1\n{table}\\2'
          updated = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          with open('README.md', 'w') as f:
              f.write(updated)
          "

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-update add-on table in README"
          git push
