---
name: Detect Changed Add-ons

on:
  workflow_call:
    outputs:
      addons:
        description: JSON array of changed addon directories
        value: ${{ jobs.detect.outputs.addons }}
      any_changed:
        description: Whether any addons changed
        value: ${{ jobs.detect.outputs.any_changed }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.changed.outputs.addons }}
      any_changed: ${{ steps.changed.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed add-ons
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          # Handle first push or force push (empty or all-zero SHA)
          if [ -z "${BASE}" ] || \
              [ "${BASE}" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(find . -maxdepth 1 -mindepth 1 -type d \
              ! -name '.git' ! -name '.github' | sed 's|^\./||' | \
              while read -r dir; do
                [ -f "${dir}/config.yaml" ] && echo "${dir}"
              done | jq -R -s -c 'split("\n") | map(select(. != ""))')
          else
            CHANGED=$(git diff --name-only "${BASE}" HEAD | \
              grep -oP '^[^/]+(?=/)' | sort -u | \
              while read -r dir; do
                [ -f "${dir}/config.yaml" ] && echo "${dir}"
              done | jq -R -s -c 'split("\n") | map(select(. != ""))')
          fi

          if [ "${CHANGED}" = "[]" ] || [ -z "${CHANGED}" ]; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
            echo "addons=[]" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            echo "addons=${CHANGED}" >> "$GITHUB_OUTPUT"
          fi
