---
name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yaml

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.detect-changes.outputs.addons) }}
        arch:
          - amd64
          - aarch64
    steps:
      - uses: actions/checkout@v6
      - name: Build ${{ matrix.addon }} (${{ matrix.arch }})
        uses: home-assistant/builder@2026.02.1
        with:
          args: --${{ matrix.arch }} --target ${{ matrix.addon }} --test
