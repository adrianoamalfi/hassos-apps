---
name: Update Addon Versions

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.find.outputs.addons }}
      any_found: ${{ steps.find.outputs.any_found }}
    steps:
      - uses: actions/checkout@v4

      - name: Find addons with upstream.yaml
        id: find
        run: |
          ADDONS=$(find . -maxdepth 2 -name 'upstream.yaml' \
            -printf '%h\n' | sed 's|^\./||' | sort | \
            jq -R -s -c 'split("\n") | map(select(. != ""))')

          if [ "${ADDONS}" = "[]" ] || [ -z "${ADDONS}" ]; then
            echo "any_found=false" >> "$GITHUB_OUTPUT"
            echo "addons=[]" >> "$GITHUB_OUTPUT"
          else
            echo "any_found=true" >> "$GITHUB_OUTPUT"
            echo "addons=${ADDONS}" >> "$GITHUB_OUTPUT"
          fi

  update:
    needs: discover
    if: needs.discover.outputs.any_found == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.discover.outputs.addons) }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Read upstream metadata
        id: meta
        run: |
          ADDON="${{ matrix.addon }}"
          python3 -c "
          import yaml, os
          with open('${ADDON}/upstream.yaml') as f:
              d = yaml.safe_load(f)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'repo={d[\"repo\"]}\n')
              out.write(f'version_arg={d[\"version_arg\"]}\n')
              out.write(f'tag_prefix={d.get(\"tag_prefix\", \"\")}\n')
          with open('${ADDON}/config.yaml') as f:
              c = yaml.safe_load(f)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'display_name={c[\"name\"]}\n')
          "

      - name: Get latest upstream version
        id: upstream
        run: |
          REPO="${{ steps.meta.outputs.repo }}"
          TAG_PREFIX="${{ steps.meta.outputs.tag_prefix }}"

          RESPONSE=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -w "\n%{http_code}" \
            "https://api.github.com/repos/${REPO}/releases/latest")

          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | head -n -1)

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::warning::Failed to fetch upstream release for ${REPO} (HTTP ${HTTP_CODE})"
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG=$(echo "${BODY}" | jq -r '.tag_name')
          VERSION="${TAG#"${TAG_PREFIX}"}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Get current Dockerfile version
        id: current
        if: steps.upstream.outputs.version != ''
        run: |
          ADDON="${{ matrix.addon }}"
          ARG="${{ steps.meta.outputs.version_arg }}"

          VERSION=$(grep "ARG ${ARG}=" "${ADDON}/Dockerfile" \
            | sed "s/ARG ${ARG}=\"\(.*\)\"/\1/")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update addon version
        if: >-
          steps.upstream.outputs.version != '' &&
          steps.upstream.outputs.version !=
          steps.current.outputs.version
        id: update
        run: |
          ADDON="${{ matrix.addon }}"
          ARG="${{ steps.meta.outputs.version_arg }}"
          NAME="${{ steps.meta.outputs.display_name }}"
          PREFIX="${{ steps.meta.outputs.tag_prefix }}"
          NEW="${{ steps.upstream.outputs.version }}"
          OLD="${{ steps.current.outputs.version }}"

          # Update Dockerfile ARG
          sed -i \
            "s/ARG ${ARG}=\"${OLD}\"/ARG ${ARG}=\"${NEW}\"/" \
            "${ADDON}/Dockerfile"

          # Bump addon patch version in config.yaml
          ADDON_VER=$(grep '^version:' "${ADDON}/config.yaml" \
            | sed 's/version: "\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$ADDON_VER"
          NEW_ADDON="${major}.${minor}.$((patch + 1))"
          sed -i \
            "s/^version: \"${ADDON_VER}\"/version: \"${NEW_ADDON}\"/" \
            "${ADDON}/config.yaml"

          # Prepend changelog entry after header
          DATE=$(date +%Y-%m-%d)
          {
            head -1 "${ADDON}/CHANGELOG.md"
            printf '\n## [%s] - %s\n\n### Changed\n\n' \
              "$NEW_ADDON" "$DATE"
            printf -- '- Updated %s to %s%s\n' \
              "$NAME" "$PREFIX" "$NEW"
            tail -n +2 "${ADDON}/CHANGELOG.md"
          } > /tmp/changelog.md
          mv /tmp/changelog.md "${ADDON}/CHANGELOG.md"

          echo "addon_version=${NEW_ADDON}" >> "$GITHUB_OUTPUT"
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          # Requires a PAT (classic, repo scope) stored as GH_PAT secret.
          # GITHUB_TOKEN cannot create PRs unless "Allow GitHub Actions to
          # create and approve pull requests" is enabled in repo settings.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          commit-message: >-
            chore(${{ matrix.addon }}): update
            ${{ steps.meta.outputs.display_name }} to
            ${{ steps.meta.outputs.tag_prefix }}${{
            steps.upstream.outputs.version }}
          branch: >-
            update/${{ matrix.addon }}-${{
            steps.meta.outputs.tag_prefix }}${{
            steps.upstream.outputs.version }}
          title: >-
            chore(${{ matrix.addon }}): update
            ${{ steps.meta.outputs.display_name }} to
            ${{ steps.meta.outputs.tag_prefix }}${{
            steps.upstream.outputs.version }}
          body: |
            Updates ${{ steps.meta.outputs.display_name }}
            from `${{ steps.meta.outputs.tag_prefix }}${{
            steps.current.outputs.version }}`
            to `${{ steps.meta.outputs.tag_prefix }}${{
            steps.upstream.outputs.version }}`.

            **Upstream release:**
            https://github.com/${{ steps.meta.outputs.repo
            }}/releases/tag/${{
            steps.meta.outputs.tag_prefix }}${{
            steps.upstream.outputs.version }}

            ---
            *Auto-created by Update Addon Versions workflow.*
          labels: "dependencies"
