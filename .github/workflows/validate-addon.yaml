---
name: Validate Add-on Structure

on:
  pull_request:

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yaml

  validate:
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.detect-changes.outputs.addons) }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate ${{ matrix.addon }} structure
        run: |
          ADDON="${{ matrix.addon }}"
          ERRORS=0

          check_file() {
            if [ ! -f "${ADDON}/$1" ]; then
              echo "::error::${ADDON}: missing required file '$1'"
              ERRORS=$((ERRORS + 1))
            fi
          }

          # Required files
          check_file "config.yaml"
          check_file "build.yaml"
          check_file "Dockerfile"
          check_file "DOCS.md"
          check_file "CHANGELOG.md"
          check_file "rootfs/run.sh"
          check_file "translations/en.yaml"

          # Validate config.yaml has required fields
          if [ -f "${ADDON}/config.yaml" ]; then
            for field in name version slug description arch; do
              if ! grep -q "^${field}:" "${ADDON}/config.yaml"; then
                echo "::error::${ADDON}/config.yaml: missing required field '${field}'"
                ERRORS=$((ERRORS + 1))
              fi
            done

            # Version must follow semver X.Y.Z
            VER=$(grep '^version:' "${ADDON}/config.yaml" \
              | sed 's/version: *"\?\([^"]*\)"\?/\1/' | tr -d '[:space:]')
            if [ -n "${VER}" ] && \
                ! echo "${VER}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::${ADDON}/config.yaml: version '${VER}' must be semver (X.Y.Z)"
              ERRORS=$((ERRORS + 1))
            fi
          fi

          # Validate build.yaml has build_from
          if [ -f "${ADDON}/build.yaml" ]; then
            if ! grep -q "build_from:" "${ADDON}/build.yaml"; then
              echo "::error::${ADDON}/build.yaml: missing 'build_from' section"
              ERRORS=$((ERRORS + 1))
            fi
          fi

          # Deprecated JSON formats must not exist
          if [ -f "${ADDON}/config.json" ]; then
            echo "::error::${ADDON}: config.json is deprecated, use config.yaml only"
            ERRORS=$((ERRORS + 1))
          fi
          if [ -f "${ADDON}/build.json" ]; then
            echo "::error::${ADDON}: build.json is deprecated, use build.yaml only"
            ERRORS=$((ERRORS + 1))
          fi

          # Check run.sh has bashio shebang
          if [ -f "${ADDON}/rootfs/run.sh" ]; then
            if ! head -1 "${ADDON}/rootfs/run.sh" | \
                grep -qE '^#!/usr/bin/with-contenv bashio'; then
              echo "::error::${ADDON}/rootfs/run.sh: must start with #!/usr/bin/with-contenv bashio"
              ERRORS=$((ERRORS + 1))
            fi
          fi

          if [ "${ERRORS}" -gt 0 ]; then
            echo "::error::${ADDON}: ${ERRORS} validation error(s) found"
            exit 1
          fi

          echo "${ADDON}: all checks passed"
