---
name: Publish

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  parse-release:
    runs-on: ubuntu-latest
    outputs:
      addon: ${{ steps.parse.outputs.addon }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse release tag
        id: parse
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Tag format: addon-name-vX.Y.Z
          # Split on the last occurrence of "-v" followed by a semver
          ADDON=$(echo "${TAG}" | rev | sed 's/[0-9.]*v-//' | rev)
          VERSION=$(echo "${TAG}" | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+$')

          if [ -z "${ADDON}" ] || [ -z "${VERSION}" ]; then
            echo "::error::Failed to parse release tag: ${TAG}"
            exit 1
          fi

          echo "addon=${ADDON}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${ADDON} v${VERSION}"

  publish:
    needs: parse-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Verify addon directory exists
        run: |
          ADDON="${{ needs.parse-release.outputs.addon }}"
          if [ ! -d "${ADDON}" ] || [ ! -f "${ADDON}/config.yaml" ]; then
            echo "::error::Add-on directory '${ADDON}' not found or missing config.yaml"
            exit 1
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ needs.parse-release.outputs.addon }} (${{ matrix.arch }})
        uses: home-assistant/builder@2026.03.2
        with:
          args: >-
            --${{ matrix.arch }}
            --target ${{ needs.parse-release.outputs.addon }}
            --docker-hub ${{ env.REGISTRY }}/${{ github.repository_owner }}

      - name: Get image digest for attestation
        id: digest
        run: |
          ARCH="${{ matrix.arch }}"
          ADDON="${{ needs.parse-release.outputs.addon }}"
          # Replace underscores with hyphens to match GHCR package naming
          ADDON_SLUG="${ADDON//_/-}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${ARCH}-addon-${ADDON_SLUG}"
          VERSION="${{ needs.parse-release.outputs.version }}"

          docker pull "${IMAGE}:${VERSION}"
          DIGEST=$(docker inspect \
            --format='{{index .RepoDigests 0}}' "${IMAGE}:${VERSION}" \
            | cut -d@ -f2)

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.digest.outputs.image }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: >-
            ${{ steps.digest.outputs.image }}:${{
            needs.parse-release.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.arch }}-${{ needs.parse-release.outputs.addon }}

      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ADDON="${{ needs.parse-release.outputs.addon }}"
          PACKAGE_NAME="${{ matrix.arch }}-addon-${ADDON}"
          # Replace underscores with hyphens to match GHCR package naming
          PACKAGE_NAME="${PACKAGE_NAME//_/-}"

          # Determine if this is a user or org account and use appropriate API
          ACCOUNT_TYPE=$(gh api /users/${{ github.repository_owner }} \
            --jq '.type' 2>/dev/null || echo "User")

          if [ "${ACCOUNT_TYPE}" = "Organization" ]; then
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME}" \
              -f visibility=public \
              || echo "::warning::Failed to set ${PACKAGE_NAME} to public"
          else
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${PACKAGE_NAME}" \
              -f visibility=public \
              || echo "::warning::Failed to set ${PACKAGE_NAME} to public"
          fi
