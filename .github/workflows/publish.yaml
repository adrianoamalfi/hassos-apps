---
name: Publish

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  parse-release:
    runs-on: ubuntu-latest
    outputs:
      addon: ${{ steps.parse.outputs.addon }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse release tag
        id: parse
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Tag format: addon-name-vX.Y.Z
          # Split on the last occurrence of "-v" followed by a semver
          ADDON=$(echo "${TAG}" | rev | sed 's/[0-9.]*v-//' | rev)
          VERSION=$(echo "${TAG}" | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+$')

          if [ -z "${ADDON}" ] || [ -z "${VERSION}" ]; then
            echo "::error::Failed to parse release tag: ${TAG}"
            exit 1
          fi

          echo "addon=${ADDON}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${ADDON} v${VERSION}"

  publish:
    needs: parse-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch:
          - amd64
          - aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Verify addon directory exists
        run: |
          ADDON="${{ needs.parse-release.outputs.addon }}"
          if [ ! -d "${ADDON}" ] || [ ! -f "${ADDON}/config.yaml" ]; then
            echo "::error::Add-on directory '${ADDON}' not found or missing config.yaml"
            exit 1
          fi

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ needs.parse-release.outputs.addon }} (${{ matrix.arch }})
        uses: home-assistant/builder@2026.02.1
        with:
          args: >-
            --${{ matrix.arch }}
            --target ${{ needs.parse-release.outputs.addon }}
            --docker-hub ${{ env.REGISTRY }}/${{ github.repository_owner }}

      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME="${{ matrix.arch }}-addon-${{ needs.parse-release.outputs.addon }}"
          # Replace underscores with hyphens to match GHCR package naming
          PACKAGE_NAME="${PACKAGE_NAME//_/-}"
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/${PACKAGE_NAME}" \
            -f visibility=public \
            || echo "::warning::Failed to set package ${PACKAGE_NAME} to public - may need to be set manually in GitHub Packages settings"
